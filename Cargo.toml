[package]
name = "charton"
version = "0.4.1"
edition = "2024"
description = "A high-level, layered charting system for Rust, designed for Polars-first data workflows and multi-backend rendering."
license = "Apache-2.0"
repository = "https://github.com/wangjiawen2013/charton"
authors = ["Jiawen Wang <wangjiawen2013@163.com>"]

[features]
# By default, no features are enabled to ensure the fastest compilation and smallest binary size.
default = []

# Enables Polars integration. When active, it allows Chart::build to accept Polars DataFrames 
# and Series directly via the ToDataset trait.
polars = ["dep:polars", "dep:polars-io"]

[dependencies]
# --- Optional Dependencies ---
# Polars is marked as optional. It is only compiled if the "polars" feature is enabled by the user.
polars = { version = "0.49", default-features = false, features = ["lazy", "rank", "pivot", "cum_agg", "partition_by"], optional = true }
polars-io = { version = "0.49", default-features = false, features = ["parquet"], optional = true }

# --- Core Dependencies ---
# These are always required for the base functionality of Charton.
thiserror = "2.0"
time = { version = "0.3", features = ["macros", "formatting"] }
kernel-density-estimation = "0.2"
resvg = "0.45"
csscolorparser = "0.8"
html-escape = "0.2"

# --- Target-Specific Dependencies (Non-Wasm) ---
# Configuration for native targets (Windows, macOS, Linux). 
# Note: 'ipc' and 'serde' related features are typically not compatible with wasm32-unknown-unknown.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# If the "polars" feature is enabled on a non-Wasm target, we add the "ipc" capability.
polars = { version = "0.49", features = ["ipc"], optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }
base64 = { version = "0.22" }