[package]
name = "charton"
version = "0.4.1"
edition = "2024"
description = "A high-level, layered charting system for Rust, designed for Polars-first data workflows and multi-backend rendering."
license = "Apache-2.0"
repository = "https://github.com/wangjiawen2013/charton"
authors = ["Jiawen Wang <wangjiawen2013@163.com>"]

[features]
default = []

# Enables universal columnar data ingestion via the Apache Arrow standard.
arrow = ["dep:arrow"]

# Enables compatibility with visualization ecosystems (e.g., Matplotlib, Altair).
polars = ["dep:polars"]

# Enables exporting SVG to PNG format using the resvg rendering engine.
resvg = ["dep:resvg"]

[dependencies]
# --- Optional Dependencies ---
arrow = { version = "58.1", default-features = false, optional = true }
polars = { version = "0.53", default-features = false, optional = true }
resvg = { version = "0.47", optional = true }

# --- Core Dependencies ---
thiserror = "2.0"
time = { version = "0.3", features = ["macros", "formatting"] }
kernel-density-estimation = "0.2"
ahash = "0.8"
rayon = "1.11.0"
csscolorparser = "0.8"
html-escape = "0.2"

# --- Target-Specific Dependencies (Non-Wasm) ---
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }
base64 = { version = "0.22" }